# ---------------------------------------------------------------------------
# Build the GUI submodule for Windows, Linux, and macOS
# ---------------------------------------------------------------------------
# Triggered on:
#   - Push / PR to main (when relevant files change)
#   - Manual dispatch (workflow_dispatch)
#
# NOTE: The application expects to live inside a directory named "GUI/" so
# that imports like `GUI.app.app` resolve correctly.  We use the checkout
# `path: GUI` option to recreate that structure in CI.
# ---------------------------------------------------------------------------

name: Build GUI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "plugins/**"
      - "plugin_system/**"
      - "themes/**"
      - "scripts/**"
      - "run.py"
      - "requirements-*.txt"
      - ".github/workflows/build-gui.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "plugins/**"
      - "plugin_system/**"
      - "themes/**"
      - "scripts/**"
      - "run.py"
      - "requirements-*.txt"
      - ".github/workflows/build-gui.yml"
  workflow_dispatch:  # allows manual runs from the Actions tab

# Cancel redundant runs on the same branch / PR
concurrency:
  group: build-gui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            requirements: GUI/requirements-win.txt
            artifact-name: GUI-Windows
            artifact-glob: "dist/*.exe"

          - os: ubuntu-22.04
            label: Linux
            requirements: GUI/requirements-linux.txt
            artifact-name: GUI-Linux
            artifact-glob: "dist/*"

          - os: macos-latest
            label: macOS
            requirements: GUI/requirements-linux.txt   # same deps (no pywin32)
            artifact-name: GUI-macOS
            artifact-glob: "dist/*"

    name: Build – ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      # ----- Checkout into GUI/ so imports resolve correctly ------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: GUI

      # ----- Python -----------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----- Linux display server (required by Qt) ----------------------------
      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libegl1 \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      # ----- Dependencies -----------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}

      # ----- Build ------------------------------------------------------------
      - name: Run build script
        run: python GUI/scripts/build.py --clean

      # ----- Upload artifact --------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30
