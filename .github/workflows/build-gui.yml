# ---------------------------------------------------------------------------
# Build the GUI submodule for Windows, Linux, and macOS
# ---------------------------------------------------------------------------
# Triggered on:
#   - Push / PR to main (when relevant files change)
#   - Release published (attaches executables to the GitHub Release)
#   - Manual dispatch (workflow_dispatch)
#
# NOTE: The application expects to live inside a directory named "GUI/" so
# that imports like `GUI.app.app` resolve correctly.  We use the checkout
# `path: GUI` option to recreate that structure in CI.
# ---------------------------------------------------------------------------

name: Build GUI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "plugins/**"
      - "plugin_system/**"
      - "themes/**"
      - "scripts/**"
      - "run.py"
      - "requirements-*.txt"
      - ".github/workflows/build-gui.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "plugins/**"
      - "plugin_system/**"
      - "themes/**"
      - "scripts/**"
      - "run.py"
      - "requirements-*.txt"
      - ".github/workflows/build-gui.yml"
  release:
    types: [published]
  workflow_dispatch:  # allows manual runs from the Actions tab

# Cancel redundant runs on the same branch / PR (but never cancel release builds)
concurrency:
  group: build-gui-${{ github.event_name == 'release' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            requirements: GUI/requirements-win.txt
            artifact-name: GUI-Windows
            artifact-glob: "GUI/dist/*.exe"
            release-suffix: "-Windows.exe"

          - os: ubuntu-22.04
            label: Linux
            requirements: GUI/requirements-linux.txt
            artifact-name: GUI-Linux
            artifact-glob: "GUI/dist/*"
            release-suffix: "-Linux"

          - os: macos-latest
            label: macOS
            requirements: GUI/requirements-linux.txt   # same deps (no pywin32)
            artifact-name: GUI-macOS
            artifact-glob: "GUI/dist/*"
            release-suffix: "-macOS"

    name: Build – ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    # Grant write access to release assets
    permissions:
      contents: write

    steps:
      # ----- Checkout into GUI/ so imports resolve correctly ------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: GUI

      # ----- Python -----------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----- Linux display server (required by Qt) ----------------------------
      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libegl1 \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      # ----- Dependencies -----------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.requirements }}

      # ----- Build ------------------------------------------------------------
      - name: Run build script
        run: python GUI/scripts/build.py --clean

      # ----- Upload CI artifact (always) --------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30

      # ----- Attach to GitHub Release (only on release events) ----------------
      - name: Prepare release asset
        if: github.event_name == 'release'
        shell: bash
        run: |
          # Find the built executable and rename it for the release
          mkdir -p release-assets
          for file in ${{ matrix.artifact-glob }}; do
            if [ -f "$file" ]; then
              base=$(basename "$file")
              name="${base%.*}"
              ext="${base##*.}"
              if [ "$base" = "$ext" ]; then
                # No extension (Linux/macOS)
                cp "$file" "release-assets/${name}${{ matrix.release-suffix }}"
              else
                # Has extension (Windows .exe)
                cp "$file" "release-assets/${name}${{ matrix.release-suffix }}"
              fi
            fi
          done

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
